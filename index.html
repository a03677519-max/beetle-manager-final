<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="manifest" href="/manifest.json">
    <!-- iOS用の設定 -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"> 
    <link rel="apple-touch-icon" href="/logo192.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BeetleLog</title>
    <script>
      // 白画面（WSoD）対策: 3秒待っても描画されない場合はキャッシュを消して強制リロード
      const checkMount = () => {
        setTimeout(() => {
          const root = document.getElementById('root');
          if (root && (root.innerHTML === '' || root.children.length === 0)) {
            console.warn('App failed to mount. Purging caches...');
            if ('serviceWorker' in navigator) {
              navigator.serviceWorker.getRegistrations().then(registrations => {
                for (let registration of registrations) registration.unregister();
                caches.keys().then(names => {
                  for (let name of names) caches.delete(name);
                  window.location.reload(true);
                });
              });
            } else {
              window.location.reload(true);
            }
          }
        }, 3000);
      };

      if (document.readyState === 'complete') { checkMount(); } else { window.addEventListener('load', checkMount); }

      // 古いハッシュ名のファイル読み込み失敗（404）時の自動復旧
      window.addEventListener('error', (e) => {
        if (e.target.tagName === 'LINK' || e.target.tagName === 'SCRIPT') {
          console.error('Resource load failed (404). Purging Service Worker and Caches...');
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(registrations => {
              for (let r of registrations) r.unregister();
              caches.keys().then(keys => {
                for (let k of keys) caches.delete(k);
                window.location.reload(true);
              });
            });
          }
        }
      }, true);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
