<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="manifest" href="/manifest.json">
    <!-- iOS用の設定 -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"> 
    <link rel="apple-touch-icon" href="/logo192.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BeetleLog</title>
    <script>
      // 白画面（WSoD）対策: 5秒待っても描画されない場合はキャッシュを消して強制リロード
      window.addEventListener('load', () => {
        setTimeout(() => {
          const root = document.getElementById('root');
          if (root && root.innerHTML === '') {
            console.warn('App failed to mount. Purging caches...');
            if ('serviceWorker' in navigator) {
              navigator.serviceWorker.getRegistrations().then(registrations => {
                for (let registration of registrations) registration.unregister();
                caches.keys().then(names => {
                  for (let name of names) caches.delete(name);
                  window.location.reload(true);
                });
              });
            } else {
              window.location.reload(true);
            }
          }
        }, 5000);
      });

      // 古いハッシュ名のファイル読み込み失敗（404）時の自動復旧
      window.addEventListener('error', (e) => {
        if (e.target.tagName === 'LINK' || e.target.tagName === 'SCRIPT') {
          const lastReload = sessionStorage.getItem('last_auto_reload');
          if (!lastReload || Date.now() - lastReload > 10000) {
            sessionStorage.setItem('last_auto_reload', Date.now());
            window.location.reload(true);
          }
        }
      }, true);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
