<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="manifest" href="/manifest.json">
    <!-- iOS用の設定 -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default"> 
    <link rel="apple-touch-icon" href="/logo192.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>BeetleLog</title>
    <script>
      // アセットの読み込み失敗(404)を検知したら即リセット
      window.addEventListener('error', function(e) {
        if (e.target.tagName === 'LINK' || e.target.tagName === 'SCRIPT') {
          console.error('Asset 404 detected. Wiping PWA cache...');
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(regs) {
              for(let r of regs) r.unregister();
              caches.keys().then(function(keys) {
                for(let k of keys) caches.delete(k);
                window.location.reload(true);
              });
            });
          }
        }
      }, true);

      // 描画失敗の監視
      window.addEventListener('load', function() {
        const REFRESH_KEY = 'beetle_reload_count';
        setTimeout(function() {
          var root = document.getElementById('root');
          // rootが空、またはReactが初期化に失敗している場合
          if (!root || root.innerHTML.trim() === '' || root.innerHTML.includes('<!--')) {
            let count = parseInt(localStorage.getItem(REFRESH_KEY) || '0');
            if (count > 2) {
              // 3回以上失敗した場合はストレージをクリアして緊急復旧
              console.error('Persistent blank screen detected. Hard resetting...');
              localStorage.clear();
              sessionStorage.clear();
              if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
              }
            }
            localStorage.setItem(REFRESH_KEY, count + 1);
            window.location.reload();
          } else {
            localStorage.removeItem(REFRESH_KEY);
          }
        }, 3000);
      });

      // 入力時やジェスチャーによる意図しないズームを抑制・自動調整する機能
      document.addEventListener('touchstart', (e) => {
        if (e.touches.length > 1) {
          e.preventDefault(); // 2本指以上のピンチズームを禁止
        }
      }, { passive: false });

      document.addEventListener('gesturestart', (e) => {
        e.preventDefault(); // iOSのジェスチャーによるズームを禁止
      });

      // 入力フォームからフォーカスが外れた際に、画面のズレや余計な余白をリセット
      document.addEventListener('focusout', () => {
        window.scrollTo(0, 0);
        // スケールを強制的に1に戻すための再適用
        const viewport = document.querySelector('meta[name="viewport"]');
        if (viewport) {
          viewport.content = 'width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover';
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
